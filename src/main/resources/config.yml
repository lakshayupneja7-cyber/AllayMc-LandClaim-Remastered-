database:
  type: SQLITE
  sqlite-file: claims.db

claims:
  provider: GRIEFPREVENTION

perks:
  switch-cooldown-seconds: 30
  apply-refresh-ticks: 40
  trusted-default-mode: ALL_TRUSTED

ui:
  actionbar-enter-message: true
  show-coming-soon-tiers: true
  titles-on-unlock: true

settings:
  default-claim-name: Unnamed Claim

tiers:
  1: 200
  2: 500
  3: 1000
  4: 2000
  5: 4000
  6: 7000
  7: 12000
  8: 20000
  9: 30000
  10: 40000
